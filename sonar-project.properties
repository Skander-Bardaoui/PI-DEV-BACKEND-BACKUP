# ═══════════════════════════════════════════════════════════════════════════
# SONARQUBE CONFIGURATION - BACKEND
# ═══════════════════════════════════════════════════════════════════════════

# Project Information
sonar.projectKey=backend
sonar.projectName=Backend API - PI DEV
sonar.projectVersion=1.0

# Source Code
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.module.ts,**/main.ts,**/*.dto.ts,**/*.entity.ts,**/*.enum.ts

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.module.ts,**/main.ts,**/*.dto.ts,**/*.entity.ts,**/*.enum.ts,**/*.spec.ts,**/*.test.ts

# Code Quality
sonar.typescript.node=node

# Duplications
sonar.cpd.exclusions=**/*.dto.ts,**/*.entity.ts,**/*.enum.ts

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300